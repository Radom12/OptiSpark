name: CI Pipeline

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: "ci_test_placeholder"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Java (required for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install client dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install flake8 pytest pytest-cov

      - name: Install server dependencies
        run: |
          pip install -r server/requirements.txt
          pip install httpx  # Required by FastAPI TestClient

      - name: Lint with flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest and require 90% coverage
        run: |
          pytest tests/ --cov=src/optispark --cov=server --cov-fail-under=90 --cov-report=term-missing -v