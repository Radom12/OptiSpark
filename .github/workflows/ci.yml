name: OptiSpark CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyspark zstandard google-genai python-dotenv
        # Install OptiSpark in editable mode to test the build
        pip install -e .

    - name: Smoke Test - Package Import
      run: |
        # This confirms the pyproject.toml and folder structure are correct
        python -c "from optispark import OptiSpark; print('✅ OptiSpark Import Successful')"

    - name: Run Basic Logic Test
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # We can run a small script to verify the reasoning engine starts
        # (Even without a live Spark cluster, we can test the class initialization)
        python -c "from optispark import OptiSpark; agent = OptiSpark(api_key='${{ secrets.GEMINI_API_KEY }}'); print('✅ Agent Initialized')"